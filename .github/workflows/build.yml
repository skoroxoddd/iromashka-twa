name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Decode keystore
      if: ${{ env.KEYSTORE_BASE64 != '' }}
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK + AAB
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease bundleRelease --stacktrace

    - name: Rename APK
      run: |
        cd app/build/outputs/apk/release
        for f in *.apk; do
          if [[ "$f" == *"unsigned"* ]]; then
            mv "$f" "iromashka-twa-unsigned.apk"
          else
            mv "$f" "iromashka-twa-signed.apk"
          fi
        done
        ls -la

    - name: Rename AAB
      run: |
        cd app/build/outputs/bundle/release
        for f in *.aab; do
          mv "$f" "iromashka-twa-signed.aab"
        done
        ls -la

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: iromashka-twa-release
        path: app/build/outputs/apk/release/*.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: iromashka-twa-aab
        path: app/build/outputs/bundle/release/*.aab

    - name: Get version info
      id: version
      run: |
        VERSION_CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}')
        VERSION_NAME=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
        echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT

    - name: Create Release
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}
        name: АйРомашка TWA v${{ steps.version.outputs.name }}
        draft: false
        prerelease: false
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
